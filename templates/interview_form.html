{% block content %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conduct Interview</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('field_officer_dashboard') }}">Dashboard</a></li>
            <li class="breadcrumb-item active">Conduct Interview</li>
        </ol>
    </nav>

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Home Visit Interview: {{ application.applicant.full_name }}</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Interview Score (0-100)</label>
                        <input type="number" step="0.1" min="0" max="100" name="interview_score" class="form-control" required>
                        <div class="form-text">Assess based on the household's financial need.</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Final Recommendation</label>
                        <select name="recommendation" class="form-select" required>
                            <option value="" disabled selected>Select an option...</option>
                            <option value="recommend">Recommend for Scholarship</option>
                            <option value="not_recommend">Do Not Recommend</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Field Officer Remarks</label>
                    <textarea name="remarks" class="form-control" rows="5" placeholder="Detail the living conditions, family status, and overall impression..."></textarea>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a href="{{ url_for('field_officer_dashboard') }}" class="btn btn-outline-secondary me-md-2">Cancel</a>
                    <button type="submit" class="btn btn-success px-5">Submit Interview Results</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
