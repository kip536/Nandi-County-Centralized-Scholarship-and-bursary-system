<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse applications</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

</head>
<div class="row">
    <h2 class="mb-4">Available Scholarship Opportunities</h2>
    {% for scholarship in scholarships %}
    <div class="col-md-4 mb-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>{{ scholarship.title }}</h5>
                <p class="text-muted small">{{ scholarship.description[:100] }}...</p>
                <form method="POST" action="{{ url_for('apply_scholarship', scholarship_id=scholarship.id) }}">
                    <button type="submit" class="btn btn-primary btn-sm w-100">
                        Apply Now
                    </button>
                </form>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
